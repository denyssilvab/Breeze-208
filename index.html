até o final — a porta estará à sua direita.</li><li><strong>Acesso ao apartamento</strong><br>A fechadura é digital. Toque no centro e insira a senha: 190190#</li></ol></div>", "guide": "<div class=\"detail-item\"><span class=\"di\">⚡</span><div><strong>Energia</strong><br>O quadro geral de energia fica na caixinha branca embutida na parede, próxima à porta. Se alguma tomada ou iluminação não estiver funcionando, verifique se todas as chaves estão ligadas. Em caso de dúvidas, envie uma mensagem ao anfitrião.</div></div><div class=\"detail-item\"><span class=\"di\">🚿</span><div><strong>Chuveiro Elétrico</strong><br>Abra o registro e deixe a água correr por alguns instantes. Em seguida, ajuste a temperatura com a <strong>chave seletora no topo do chuveiro</strong>:<br>• Posição 1 — Verão (mais frio)<br>• Posição 2 — Médio<br>• Posição 3 — Inverno (mais quente)</div></div><div class=\"detail-item\"><span class=\"di\">🍳</span><div><strong>Cooktop de Indução (1 boca)</strong><br>1. Verifique se está conectado à tomada.<br>2. Use apenas as panelas disponibilizadas no armário.<br>3. Por favor, utilize a tampa das panelas.<br><br>• <strong>ON/OFF</strong>: ligar/desligar<br>• <strong>MODO</strong>: intensidade<br>• <strong>TIMER</strong>: desligamento automático<br><em>É normal que a superfície permaneça quente e as ventoinhas continuem por alguns minutos após desligar.</em></div></div><div class=\"detail-item\"><span class=\"di\">📺</span><div><strong>Smart TV & Streaming</strong><div class=\"tv-row\"><div class=\"tv-logo-wrap\"><img src=\"img/netflix.svg\" class=\"tv-logo\" alt=\"Netflix\"></div><span><strong>Netflix</strong> — Perfil <strong>Breeze208</strong> já logado · Não saia da conta</span></div><div class=\"tv-row\"><div class=\"tv-logo-wrap\"><img src=\"img/disneyplus.svg\" class=\"tv-logo\" alt=\"Disney+\"></div><span><strong>Disney+</strong> — Perfil <strong>Breeze208</strong> já logado · Não saia da conta</span></div><div class=\"tv-row\"><div class=\"tv-logo-w  22h</strong></div><ul class=\"bullets\"><li>Ajuste a temperatura antes de entrar</li><li>Proibido comer/beber, objetos de vidro dentro da sauna</li><li>Máximo de 2 pessoas por vez</li></ul></div><div class=\"subsection\"><div class=\"sub-title\">💪 Academia</div><div class=\"info-box\">⏰ Todos os dias por <strong>24h</strong></div><p class=\"body-text\">É no subsolo (−1). Consulte disponibilidade na portaria.</p></div><div class=\"subsection\"><div class=\"sub-title\">🔥 Área Gourmet e Churrasqueira</div><div class=\"info-box\">⏰ Todos os dias das <strong>6h às 22h</strong></div><ul class=\"bullets\"><li>Taxa de reserva da churrasqueira: R$100,00 — reserve na portaria</li><li>Proibido objetos de vidro e som portátil</li></ul></div><div class=\"subsection\"><div class=\"sub-title\">👕 Lavanderia</div><div class=\"info-box\">⏰ Todos os dias por <strong>24h</strong></div><ul class=\"bullets\"><li>Consulte disponibilidade na portaria</li><li><strong>R$ 17,50</strong> lavar · <strong>R$ 17,50</strong> secar</li></ul></div><div class=\"subsection\"><div class=\"sub-title\">🏖️ Acesso à Praia</div><p class=\"body-text\">Portão no piso principal — acesso direto à areia. Ao voltar, use a ducha na entrada antes de entrar.</p></div><div class=\"subsection\"><div class=\"sub-title\">📋 Regras Gerais</div><ul class=\"bullets\"><li>Proibido circular de roupa de banho nas áreas comuns</li><li>Estritamente proibido fumar em todo o condomínio</li><li>Lixo em sacos plásticos — despeje nas lixeiras disponíveis no subsolo (Piso -1)</li><li>Não é permitido receber visitas externas</li><li>Estacionamento rotativo no subsolo + 2 vagas gratuitas na frente. Estacione em qualquer vaga, desde que esteja livre.</li></ul></div>", "loc": "<div class=\"subsection\"><div class=\"info-box\">📍 Avenida Governador Argemiro de Figueiredo, 540 — Jardim Oceania, João Pessoa – PB · Apartamento 208<br><em>Em frente ao Colégio ISO</em></div><a href=\"https://maps.google.com/?q=Av.+Gov.+Argemiro+de+Figueiredo,+5 ton 1). When you exit, follow the hallway to the end — the door will be on your right.</li><li><strong>Apartment access</strong><br>The lock is digital. Touch the center and enter the code: 190190#</li></ol></div>", "guide": "<div class=\"detail-item\"><span class=\"di\">⚡</span><div><strong>Power</strong><br>The main breaker is in the white built-in box near the front door. If any outlet or light is not working, check that all switches are on. If you have any questions, send a message to the host.</div></div><div class=\"detail-item\"><span class=\"di\">🚿</span><div><strong>Electric Shower</strong><br>Open the water valve and let it run for a few moments. Then adjust the temperature with the <strong>selector switch at the top of the shower</strong>:<br>• Position 1 — Summer (coolest)<br>• Position 2 — Medium<br>• Position 3 — Winter (hottest)</div></div><div class=\"detail-item\"><span class=\"di\">🍳</span><div><strong>Induction Cooktop (1 burner)</strong><br>1. Make sure it's plugged in.<br>2. Use only the pots provided in the cabinet.<br>3. Please use the pot lids.<br><br>• <strong>ON/OFF</strong>: turn on/off<br>• <strong>MODE</strong>: power level<br>• <strong>TIMER</strong>: auto shut-off<br><em>It's normal for the surface to remain hot and the fans to keep running for a few minutes after turning off.</em></div></div><div class=\"detail-item\"><span class=\"di\">📺</span><div><strong>Smart TV & Streaming</strong><div class=\"tv-row\"><div class=\"tv-logo-wrap\"><img src=\"img/netflix.svg\" class=\"tv-logo\" alt=\"Netflix\"></div><span><strong>Netflix</strong> — <strong>Breeze208</strong> profile already signed in · Do not log out</span></div><div class=\"tv-row\"><div class=\"tv-logo-wrap\"><img src=\"img/disneyplus.svg\" class=\"tv-logo\" alt=\"Disney+\"></div><span><strong>Disney+</strong> — <strong>Breeze208</strong> profile already signed in · Do not log out</span></div><div class=\"tv-row\"><div class=\"tv-logo-wrap\"><img src=\"img/globoplay.png\" class=\"tv-logo\" alt=\"Globoplay\"></div><span><strong>Globoplay</strong> — Free live TV Globo · no login required</span></div><div class=\"tv-row\"><div class=\"tv-logo-wrap\"><img src=\"img/youtube.webp\" class=\"tv-logo\" alt=\"YouTube\"></div><span><strong>YouTube</strong> — SBT live and your favorite videos</span></div><div class=\"tv-note\">⚠️ Want to use your own account? Add a profile and remove it before checkout. If the TV is logged out, contact the host.</div></div></div><div class=\"detail-item\"><span class=\"di\">🛏️</span><div><strong>Where to find things</strong><br>• Trash bags — <em>kitchen cabinet drawers</em><br>• Iron — <em>2nd drawer of the wardrobe</em><br>• Hair dryer — <em>bathroom cabinet</em><br>• Hygiene and cleaning products — <em>bathroom cabinet</em></div></div><div class=\"detail-item\"><span class=\"di\">🧹</span><div><strong>Cleaning Supplies</strong><br>The apartment already has some basic cleaning items in the bathroom cabinet. For items such as a broom, mop and buckets, ask at the front desk or contact the host.</div></div><div class=\"detail-item\"><span class=\"di\">🪟</span><div><strong>Side Window</strong><br>Before leaving, make sure to close the side window. The region has unpredictable rain that can wet the interior.</div></div>", "areas": "<div class=\"subsection\"><div class=\"sub-title\">🏊 Swimming Pool</div><div class=\"info-box\">⏰ Every day from <strong>6am to 10pm</strong> — except cleaning days (at night).</div><ul class=\"bullets\"><li>Shower before entering and wear appropriate swimwear</li><li>When leaving the pool wet, use the service elevator (2)</li><li>Children must always be accompanied by an adult</li><li>No diving, eating/drinking, glass objects, or parties</li></ul></div><div class=\"subsection\"><div class=\"sub-title\">🧖 Sauna</div><div class=\"info-box\">⏰ Every day from <strong>6am to 10pm</strong></div><ul class=\"bullets\"><li>Adjust the temperature before entering</li><li>No eating/drinking or glass object our vous donner accès aux espaces communs — c'est rapide et simple.</li><li><strong>En arrivant à l'appartement</strong><br>Prenez l'ascenseur jusqu'au 1er étage (bouton 1). En sortant, suivez le couloir jusqu'au bout — la porte sera sur votre droite.</li><li><strong>Accès à l'appartement</strong><br>La serrure est numérique. Appuyez sur le centre et saisissez le code: 190190#</li></ol></div>", "guide": "<div class=\"detail-item\"><span class=\"di\">⚡</span><div><strong>Énergie</strong><br>Le tableau électrique se trouve dans la boîte blanche encastrée près de la porte. Si une prise ou une lumière ne fonctionne pas, vérifiez que tous les interrupteurs sont activés. En cas de doute, envoyez un message à l'hôte.</div></div><div class=\"detail-item\"><span class=\"di\">🚿</span><div><strong>Douche Électrique</strong><br>Ouvrez le robinet et laissez couler l'eau quelques instants. Puis réglez la température avec le <strong>sélecteur en haut de la douche</strong>:<br>• Position 1 — Été (plus frais)<br>• Position 2 — Moyen<br>• Position 3 — Hiver (plus chaud)</div></div><div class=\"detail-item\"><span class=\"di\">🍳</span><div><strong>Plaque à Induction (1 feu)</strong><br>1. Vérifiez qu'elle est branchée.<br>2. N'utilisez que les casseroles mises à disposition dans le placard.<br>3. Veuillez utiliser les couvercles des casseroles.<br><br>• <strong>ON/OFF</strong>: allumer/éteindre<br>• <strong>MODE</strong>: intensité<br>• <strong>TIMER</strong>: arrêt automatique<br><em>Il est normal que la surface reste chaude et que les ventilateurs continuent quelques minutes après l'extinction.</em></div></div><div class=\"detail-item\"><span class=\"di\">📺</span><div><strong>Smart TV & Streaming</strong><div class=\"tv-row\"><div class=\"tv-logo-wrap\"><img src=\"img/netflix.svg\" class=\"tv-logo\" alt=\"Netflix\"></div><span><strong>Netflix</strong> — Profil <strong>Breeze208</strong> déjà connecté · Ne pas se déconnecter</span></div><div class=\"tv-row\"><div class=\"tv-logo-wrap\"><img src=\"img/disneyplus.svg\" class=\"tv-logo\" alt=\"Disney+\"></div><span><strong>Disney+</strong> — Profil <strong>Breeze208</strong> déjà connecté · Ne pas se déconnecter</span></div><div class=\"tv-row\"><div class=\"tv-logo-wrap\"><img src=\"img/globoplay.png\" class=\"tv-logo\" alt=\"Globoplay\"></div><span><strong>Globoplay</strong> — TV Globo en direct gratuite · sans connexion</span></div><div class=\"tv-row\"><div class=\"tv-logo-wrap\"><img src=\"img/youtube.webp\" class=\"tv-logo\" alt=\"YouTube\"></div><span><strong>YouTube</strong> — SBT en direct et vos vidéos préférées</span></div><div class=\"tv-note\">⚠️ Vous voulez utiliser votre propre compte ? Ajoutez un profil et supprimez-le avant de partir. Si la TV est déconnectée, contactez l'hôte.</div></div></div><div class=\"detail-item\"><span class=\"di\">🛏️</span><div><strong>Où trouver</strong><br>• Sacs poubelle — <em>tiroirs du meuble de cuisine</em><br>• Fer à repasser — <em>2e tiroir de l'armoire</em><br>• Sèche-cheveux — <em>armoire de la salle de bain</em><br>• Produits d'hygiène et de nettoyage — <em>armoire de la salle de bain</em></div></div><div class=\"detail-item\"><span class=\"di\">🧹</span><div><strong>Produits de Nettoyage</strong><br>L'appartement dispose déjà de quelques produits de nettoyage de base dans l'armoire de la salle de bain. Pour des articles comme un balai, une raclette et des seaux, demandez à la réception ou contactez l'hôte.</div></div><div class=\"detail-item\"><span class=\"di\">🪟</span><div><strong>Fenêtre Latérale</strong><br>Avant de partir, assurez-vous de fermer la fenêtre latérale. La région peut avoir des pluies imprévisibles.</div></div>", "areas": "<div class=\"subsection\"><div class=\"sub-title\">🏊 Piscine</div><div class=\"info-box\">⏰ Tous les jours de <strong>6h à 22h</strong> — sauf les jours de nettoyage (la nuit).</div><ul class=\"bullets\"><li>Douchez-vous avant d'entrer et portez une tenue de bain appropriée</li><li>En sortant de la piscine mouillé(e), utilisez l'ascenseur de service (2)</li><li>Les enfants doivent toujours être accompagnés d'un adulte</li><li>Plongeon interdit, manger/boire, objets en verre et fêtes interdits</li></ul></div><div class=\"subsection\"><div class=\"sub-title\">🧖 Sauna</div><div class=\"info-box\">⏰ Tous les jours de <strong>6h à 22h</strong></div><ul class=\"bullets\"><li>Réglez la température avant d'entrer</li><li>Interdit de manger/boire, objets en verre à l'intérieur du sauna</li><li>Maximum 2 personnes à la fois</li></ul></div><div class=\"subsection\"><div class=\"sub-title\">💪 Salle de Sport</div><div class=\"info-box\">⏰ Ouverte <strong>24h/24</strong></div><p class=\"body-text\">Située en sous-sol (−1). Vérifiez la disponibilité à la réception.</p></div><div class=\"subsection\"><div class=\"sub-title\">🔥 Espace Gourmet & Barbecue</div><div class=\"info-box\">⏰ Tous les jours de <strong>6h à 22h</strong></div><ul class=\"bullets\"><li>Frais de réservation du barbecue : R$100,00 — réservez à la réception</li><li>Objets en verre et enceintes portables interdits</li></ul></div><div class=\"subsection\"><div class=\"sub-title\">👕 Laverie</div><div class=\"info-box\">⏰ Ouverte <strong>24h/24</strong></div><ul class=\"bullets\"><li>Vérifiez la disponibilité à la réception</li><li><strong>R$ 17,50</strong> laver · <strong>R$ 17,50</strong> sécher</li></ul></div><div class=\"subsection\"><div class=\"sub-title\">🏖️ Accès à la Plage</div><p class=\"body-text\">Portail au rez-de-chaussée — accès direct à la plage. Au retour, utilisez la douche à l'entrée avant d'entrer.</p></div><div class=\"subsection\"><div class=\"sub-title\">📋 Règles Générales</div><ul class=\"bullets\"><li>Tenues de bain interdites dans les espaces communs</li><li>Il est strictement interdit de fumer dans toute la résidence</li><li>Déchets dans des sacs plastiques — jetez-les dans les poubelles du sous-sol (Niveau -1)</li><li>Les visites externes ne sont pas autorisées</li><li>Parking rotatif en sous-sol + 2 places gratuites à l'entrée. Garez-vous dans n'importe quelle place libre.</li></ul></div>", "loc": "<div class=\"subsection\"><div class=\"info-box\">📍 Avenida Governador Argemiro de Figueiredo, 540 — Jardim Oceania, João Pessoa – PB · Appartement 208<br><em>En face du Colégio ISO</em></div><a href=\"https://maps.google.com/?q=Av.+Gov.+Argemiro+de+Figueiredo,+540,+Jardim+Oceania,+Jo%C3%A3o+Pessoa\" target=\"_blank\" class=\"map-btn\">🗺️ Ouvrir dans Google Maps</a></div>", "out": "<div class=\"subsection\"><div class=\"info-box\">⏰ Avant 12h</div></div><div class=\"subsection\"><div class=\"sub-title\">Avant de partir</div><ul class=\"checklist\"><li>✅ Fermez la fenêtre latérale</li><li>✅ Éteignez les lumières, la climatisation, la TV et les appareils (sauf le minibar)</li><li>✅ Effectuez le checkout à la réception</li></ul></div>", "contacts_t": "Contacts Utiles", "contacts": "<div class=\"contact-list\"><div class=\"contact-item\"><span class=\"contact-lbl\">Hôte</span><a href=\"tel:+5588998630166\" class=\"contact-num\">+55 88 99863-0166</a></div><div class=\"contact-item\"><span class=\"contact-lbl\">Réception</span><a href=\"tel:+5583988351392\" class=\"contact-num\">+55 83 98835-1392</a></div><div class=\"contact-item\"><span class=\"contact-lbl\">Pompiers</span><a href=\"tel:193\" class=\"contact-num\">193</a></div><div class=\"contact-item\"><span class=\"contact-lbl\">Police</span><a href=\"tel:190\" class=\"contact-num\">190</a></div><div class=\"contact-item\"><span class=\"contact-lbl\">Ambulance (SAMU)</span><a href=\"tel:192\" class=\"contact-num\">192</a></div></div>", "tab_ess": "Essentiels", "tab_dicas": "Bons Plans", "s_contacts": "Contacts"},

abilitare l'accesso alle aree comuni — è veloce e semplice.</li><li><strong>Arrivando all'appartamento</strong><br>Prendere l'ascensore fino al 1° piano (pulsante 1). All'uscita, seguire il corridoio fino alla fine — la porta sarà sulla destra.</li><li><strong>Accesso all'appartamento</strong><br>La serratura è digitale. Premere il centro e inserire il codice: 190190#</li></ol></div>", "guide": "<div class=\"detail-item\"><span class=\"di\">⚡</span><div><strong>Energia</strong><br>Il quadro elettrico si trova nella scatola bianca a incasso vicino alla porta. Se una presa o una luce non funziona, verifica che tutti gli interruttori siano accesi. In caso di dubbi, invia un messaggio all'host.</div></div><div class=\"detail-item\"><span class=\"di\">🚿</span><div><strong>Doccia Elettrica</strong><br>Apri la valvola dell'acqua e lasciala scorrere per qualche istante. Poi regola la temperatura con il <strong>selettore in cima alla doccia</strong>:<br>• Posizione 1 — Estate (più fresco)<br>• Posizione 2 — Medio<br>• Posizione 3 — Inverno (più caldo)</div></div><div class=\"detail-item\"><span class=\"di\">🍳</span><div><strong>Piano a Induzione (1 fuoco)</strong><br>1. Verifica che sia collegato alla presa.<br>2. Usa solo le pentole messe a disposizione nell'armadio.<br>3. Per favore, utilizza i coperchi delle pentole.<br><br>• <strong>ON/OFF</strong>: accendere/spegnere<br>• <strong>MODO</strong>: intensità<br>• <strong>TIMER</strong>: spegnimento automatico<br><em>È normale che la superficie rimanga calda e le ventole continuino per qualche minuto dopo lo spegnimento.</em></div></div><div class=\"detail-item\"><span class=\"di\">📺</span><div><strong>Smart TV & Streaming</strong><div class=\"tv-row\"><div class=\"tv-logo-wrap\"><img src=\"img/netflix.svg\" class=\"tv-logo\" alt=\"Netflix\"></div><span><strong>Netflix</strong> — Profilo <strong>Breeze208</strong> già connesso · Non fare logout</span></div><div class=\"tv-row\"><div class=\"tv-logo-wrap\"><img src=\"img/disn

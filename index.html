<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breeze 208</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ocean:      #0c4a6e;
      --ocean-mid:  #075985;
      --teal:       #0284c7;
      --teal-light: #38bdf8;
      --foam:       #f0f9ff;
      --foam-dark:  #dbeafe;
      --sand:       #fdf4dc;
      --sand-warm:  #f0d9a0;
      --gold:       #c9a85c;
      --gold-dark:  #9a7a3a;
      --text-dark:  #0f2537;
      --text:       #334155;
      --text-light: #64748b;
      --white:      #ffffff;
      --border:     #dde5ef;
      --red:        #dc2626;
      --wa-green:   #25d366;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--foam);
      color: var(--text);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 96px;
    }

    /* LANG BAR */
    .lang-bar {
      position: sticky; top: 0; z-index: 100;
      background: var(--ocean);
      display: flex; justify-content: flex-end;
      gap: 6px; padding: 8px 16px;
    }
    .lang-btn {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,.3);
      color: rgba(255,255,255,.65);
      border-radius: 999px;
      font-size: 12px; font-family: 'Inter', sans-serif; font-weight: 500;
      padding: 4px 13px; cursor: pointer; transition: all .2s;
    }
    .lang-btn.active {
      background: rgba(255,255,255,.18);
      border-color: rgba(255,255,255,.8);
      color: var(--white);
    }

    /* HERO */
    .hero {
      background: linear-gradient(165deg, var(--ocean) 0%, var(--ocean-mid) 45%, #0ea5e9 100%);
      color: var(--white);
      padding: 40px 24px 60px;
      text-align: center;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 44px; background: var(--foam);
      clip-path: ellipse(62% 100% at 50% 100%);
    }
    .hero-eyebrow {
      font-size: 11px; font-weight: 500;
      letter-spacing: .15em; text-transform: uppercase;
      opacity: .7; margin-bottom: 10px;
    }
    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 50px; font-weight: 700;
      line-height: 1.05; margin-bottom: 8px;
    }
    .hero-sub {
      font-size: 13px; opacity: .72;
      font-weight: 300; margin-bottom: 28px;
    }
    .hero-times {
      display: inline-flex; gap: 28px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 18px; padding: 18px 32px;
      backdrop-filter: blur(8px);
    }
    .hero-time { text-align: center; }
    .hero-time .ht-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      opacity: .6; margin-bottom: 4px;
    }
    .hero-time .ht-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px; font-weight: 600; line-height: 1;
    }
    .hero-time .ht-sub { font-size: 10px; opacity: .5; margin-top: 3px; }
    .hero-div { width: 1px; background: rgba(255,255,255,.2); }

    /* MAIN */
    main { max-width: 500px; margin: 0 auto; padding: 4px 16px 0; }

    .section-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--teal); margin: 28px 0 12px; padding-left: 2px;
    }

    /* ACCORDION */
    .accordion { display: flex; flex-direction: column; gap: 10px; }
    .acc-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      transition: box-shadow .2s;
    }
    .acc-item.open { box-shadow: 0 4px 20px rgba(12,74,110,.07); }
    .acc-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 18px; cursor: pointer;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .acc-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .acc-title { flex: 1; font-size: 15px; font-weight: 600; color: var(--text-dark); }
    .acc-chevron {
      color: var(--text-light); transition: transform .25s; flex-shrink: 0;
    }
    .acc-item.open .acc-chevron { transform: rotate(180deg); }
    .acc-body {
      display: none; padding: 0 18px 18px;
      border-top: 1px solid var(--border);
    }
    .acc-item.open .acc-body { display: block; }
    .acc-body-inner { padding-top: 16px; }

    /* CONTENT ATOMS */
    .subsection { margin-bottom: 18px; }
    .subsection:last-child { margin-bottom: 0; }
    .sub-title {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--text-light); margin-bottom: 10px;
    }
    .pw-box {
      background: var(--sand);
      border: 1px solid var(--sand-warm);
      border-radius: 10px; padding: 12px 16px; margin-bottom: 8px;
    }
    .pw-label { font-size: 11px; color: var(--text-light); margin-bottom: 4px; }
    .pw-value {
      font-family: 'Courier New', monospace;
      font-size: 20px; font-weight: 700;
      color: var(--ocean); letter-spacing: .04em;
    }
    .pw-note { font-size: 11px; color: var(--text-light); margin-top: 3px; font-style: italic; }
    .steps { list-style: none; counter-reset: s; display: flex; flex-direction: column; gap: 12px; }
    .steps li {
      counter-increment: s; display: flex; gap: 12px;
      font-size: 14px; color: var(--text);
    }
    .steps li::before {
      content: counter(s);
      min-width: 24px; height: 24px;
      background: var(--ocean); color: var(--white);
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 2px;
    }
    .bullets { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .bullets li { font-size: 14px; color: var(--text); display: flex; gap: 8px; }
    .bullets li .bi { flex-shrink: 0; }
    .info-box {
      background: var(--foam-dark);
      border-left: 3px solid var(--teal);
      border-radius: 0 8px 8px 0;
      padding: 10px 14px; font-size: 13px;
      color: var(--ocean); margin-bottom: 12px;
    }
    .body-text { font-size: 14px; color: var(--text); margin-bottom: 8px; }
    .detail-item { display: flex; gap: 12px; font-size: 14px; color: var(--text); margin-bottom: 14px; }
    .detail-item .di { flex-shrink: 0; width: 22px; margin-top: 1px; }
    .map-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--teal); color: var(--white);
      border-radius: 12px; padding: 14px 20px;
      font-size: 15px; font-weight: 600;
      text-decoration: none; margin: 14px 0;
      transition: background .2s;
    }
    .map-btn:active { background: var(--ocean); }
    .prox-item {
      display: flex; gap: 10px; font-size: 13px;
      color: var(--text); background: var(--foam);
      border-radius: 8px; padding: 8px 12px; margin-bottom: 6px;
    }
    .checklist { list-style: none; display: flex; flex-direction: column; gap: 9px; }
    .checklist li { font-size: 14px; color: var(--text); display: flex; gap: 10px; }

    /* ICON BG */
    .bg-b { background: #dbeafe; }
    .bg-t { background: #e0f2fe; }
    .bg-s { background: var(--sand); }
    .bg-g { background: #dcfce7; }
    .bg-o { background: #fff7ed; }
    .bg-p { background: #f3e8ff; }

    /* TIPS PLACEHOLDER */
    .tips-ph {
      background: linear-gradient(135deg, var(--sand), var(--sand-warm));
      border: 1.5px dashed var(--gold);
      border-radius: 16px; padding: 32px 20px; text-align: center;
    }
    .tips-ph .ti { font-size: 36px; margin-bottom: 10px; }
    .tips-ph h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 600; color: #7c5c28; margin-bottom: 6px;
    }
    .tips-ph p { font-size: 13px; color: var(--gold-dark); }

    /* FAB */
    .fab-bar {
      position: fixed; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 500px;
      display: flex; gap: 10px; padding: 10px 16px 14px;
      background: rgba(240,249,255,.92);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      z-index: 200;
    }
    .fab-btn {
      flex: 1; display: flex; align-items: center;
      justify-content: center; gap: 8px;
      border-radius: 14px; padding: 14px 10px;
      font-size: 14px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      text-decoration: none; transition: opacity .15s;
    }
    .fab-btn:active { opacity: .82; }
    .fab-wa { background: var(--wa-green); color: var(--white); }
    .fab-port { background: var(--ocean); color: var(--white); }

    /* FOOTER */
    footer {
      text-align: center; padding: 20px 16px 0;
      font-size: 12px; color: var(--text-light);
      max-width: 500px; margin: 0 auto;
    }
    footer strong { color: var(--teal); }
    .footer-line { border: none; border-top: 1px solid var(--border); margin-bottom: 14px; }
  </style>
</head>
<body>

<div class="lang-bar">

  <button class="lang-btn" data-lang="en" onclick="setLang('en')">🇺🇸 EN</button>

    const v = T[lang][el.dataset.i18n];
    if (v !== undefined) el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const v = T[lang][el.dataset.i18nHtml];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang)
  );
}
